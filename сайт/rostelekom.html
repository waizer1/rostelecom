    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <button class="modal-close" id="closeRegister">&times;</button>
            <h2 class="modal-title">Регистрация</h2>
            <form class="modal-form" id="registerForm">
                <div class="form-group">
                    <label for="reg-name">Имя</label>
                    <input type="text" id="reg-name" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" placeholder="Придумайте пароль" required>
                </div>
                <div class="form-group">
                    <label for="reg-password-confirm">Подтвердите пароль</label>
                    <input type="password" id="reg-password-confirm" placeholder="Повторите пароль" required>
                </div>
                <div class="form-message" id="reg-message"></div>
                <button type="submit" class="modal-btn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </form>
            <p class="modal-switch">
                Уже есть аккаунт?
                <span id="switchToLogin">Войти</span>
            </p>
        </div>
    </div>


    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="modal-close" id="closeLogin">&times;</button>
            <h2 class="modal-title">Вход</h2>
            <form class="modal-form" id="loginForm">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль" required>
                </div>
                <div class="form-message" id="login-message"></div>
                <button type="submit" class="modal-btn">ВОЙТИ</button>
            </form>
            <p class="modal-switch">
                Нет аккаунта?
                <span id="switchToRegister">Зарегистрироваться</span>
            </p>
        </div>
    </div>
